kind = "web"
previewPath = "/"
title = "Staff Portal"
version = "1.0.0"
id = "artifacts/staff-portal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/staff-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/staff-portal", "run", "build" ]
serve = "static"
publicDir = "artifacts/staff-portal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
